<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title%}{% endblock%} - KeySafe</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom CSS -->
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fdfbfb, #ebedee);
        }

        .auth-container {
            display: flex;
            min-height: 100vh;
        }

        /* LEFT PANEL */
        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #141e30, #243b55);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 40px;
        }

        .left-panel::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(
                circle at center,
                rgba(255,255,255,0.08),
                transparent
            );
        }

        .left-panel img {
            width: 80%;
            max-width: 480px;
            z-index: 2;
            filter: drop-shadow(0px 20px 35px rgba(0,0,0,0.6));
            transition: transform 0.4s ease;
        }

        .left-panel img:hover {
            transform: scale(1.05);
        }

        /* RIGHT PANEL */
        .right-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            overflow-y: auto;
        }

        /* AUTH CARD */
        .auth-card {
            width: 100%;
            max-width: 460px;
            padding: 32px;
            border-radius: 20px;

            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(12px);

            box-shadow: 0 20px 50px rgba(0,0,0,0.15);

            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-title {
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
            color: #243b55;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 14px;
            min-height: 48px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #243b55, #141e30);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .form-text-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .form-text-link a {
            text-decoration: none;
            color: #243b55;
            font-weight: 600;
        }

        .form-text-link a:hover {
            text-decoration: underline;
        }

        /* =========================
        MOBILE RESPONSIVE
        ========================== */

        @media (max-width: 992px) {

            .auth-container {
                flex-direction: column;
                min-height: 100vh;
            }

            .left-panel {
                flex: unset;
                min-height: 220px;
                padding: 30px 20px;
            }

            .left-panel img {
                width: 180px;
                max-width: 70%;
            }

            .right-panel {
                flex: 1;
                width: 100%;
                align-items: flex-start;
                padding: 24px 18px 40px;
            }

            .auth-card {
                max-width: 100%;
                width: 100%;
                padding: 24px;
                border-radius: 18px;
            }
        }

        @media (max-width: 576px) {

            .left-panel {
                min-height: 180px;
                padding: 24px 16px;
            }

            .left-panel img {
                width: 150px;
            }

            .right-panel {
                padding: 18px 14px 32px;
            }

            .auth-card {
                padding: 20px;
                border-radius: 16px;
            }

            .auth-title {
                font-size: 24px;
                margin-bottom: 20px;
            }

            .form-control {
                font-size: 15px;
                padding: 11px 12px;
            }

            .btn-primary {
                padding: 11px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <!-- LEFT -->
    <div class="left-panel">
        <img src="{% static 'images/logo.png' %}" alt="KeySafe Logo">
    </div>

    <!-- RIGHT -->
    <div class="right-panel">
        {% block content %}{% endblock %}
    </div>
</div>

</body>
</html>
