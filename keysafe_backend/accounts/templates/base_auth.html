<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title%}{% endblock%} - KeySafe</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom CSS -->
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .auth-container {
            display: flex;
            min-height: 100vh;   /* instead of fixed height */
        }

        .right-panel {
            overflow-y: auto;    /* 👈 allows scroll if needed */
        }

        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #141e30, #243b55);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .left-panel::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.1), transparent);
        }

        .left-panel img {
            width: 80%;              /* increased from ~65% */
            max-width: 480px;        /* bigger cap */
            z-index: 2;
            filter: drop-shadow(0px 20px 35px rgba(0,0,0,0.6));
            transition: transform 0.4s ease;
        }

        .left-panel img:hover {
            transform: scale(1.05);
        }

        .right-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fdfbfb, #ebedee);
            padding: 40px 20px;   /* 👈 ADD THIS */
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: 25px;   /* reduced from 35px */
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);

            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-title {
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
            color: #243b55;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #243b55, #141e30);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .form-text-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .form-text-link a {
            text-decoration: none;
            color: #243b55;
            font-weight: 600;
        }

        .form-text-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <!-- LEFT -->
    <div class="left-panel">
        <img src="{% static 'images/logo.png' %}" alt="KeySafe Logo">
    </div>

    <!-- RIGHT -->
    <div class="right-panel">
        {% block content %}{% endblock %}
    </div>
</div>

</body>
</html>
