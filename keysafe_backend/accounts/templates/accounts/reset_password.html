{% extends 'base_auth.html' %}

{% block css %}
<style>

.reset-desc {
    text-align: center;
    color: #64748b;
    margin-bottom: 24px;
}

</style>
{% endblock %}

{% block content %}

<div class="auth-card">

    <h3 class="auth-title">
        Create New Password
    </h3>

    {% include 'components/messages.html' %}

    <p class="reset-desc">
        Your new password must be secure and unique.
    </p>

    <form method="post">

        {% csrf_token %}

        <div class="mb-3">
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="🔒 New Password"
                   required>
        </div>

        <div class="mb-3">
            <input type="password"
                   name="confirm_password"
                   class="form-control"
                   placeholder="🔒 Confirm Password"
                   required>
        </div>

        <button class="btn btn-primary w-100">
            Update Password
        </button>

    </form>

</div>

{% endblock %}
