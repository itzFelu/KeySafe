{% extends 'base_auth.html' %}
{% load static %}

{% block css %}
<style>

.forgot-card {
    width: 100%;
}

.forgot-desc {
    text-align: center;
    color: #64748b;
    margin-bottom: 24px;
}

</style>
{% endblock %}

{% block content %}

<div class="auth-card forgot-card">

    <h3 class="auth-title">
        Reset Password
    </h3>
    {% include 'components/messages.html' %}

    <p class="forgot-desc">
        Enter your registered email address to receive a password reset link.
    </p>

    <form method="post">

        {% csrf_token %}

        <div class="mb-3">

            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="📧 Email Address"
                   required>

        </div>

        <button class="btn btn-primary w-100">
            Send Reset Link
        </button>

    </form>

    <div class="form-text-link mt-4">
        <a href="{% url 'login' %}">
            Back to Login
        </a>
    </div>

</div>

{% endblock %}
