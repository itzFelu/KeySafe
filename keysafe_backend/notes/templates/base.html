{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title%}{% endblock%} - KeySafe</title>

    <link rel="icon" href="{% static 'images/favicon.png' %}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: #f5f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* 🔹 Navbar */
        .custom-navbar {
            background: #1e293b;
            /* padding: 16px 24px; */
            min-height: 80px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        /* 🔹 Branding Wrapper (Fix blending issue) */
        .branding-wrapper {
            background: rgba(255,255,255,0.95);  /* 👈 contrast background */
            padding: 6px 10px;
            border-radius: 10px;
        }

        /* 🔹 Branding Image */
        .nav-branding {
            height: 80px !important;
            width: auto !important;
            max-height: none !important;
            display: block;
        }

        /* 🔹 Avatar Image */
        .avatar-img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
            transition: 0.3s;
        }

        .avatar-img:hover {
            transform: scale(1.05);
        }

        /* 🔹 Name under avatar */
        .avatar-name {
            color: white;
            font-size: 12px;
        }

        /* 🔹 Dropdown */
        .dropdown-menu {
            border-radius: 10px;
        }

        .dashboard-container {
            padding: 40px 20px;
        }

        .add-note-btn {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        /* 🔹 Note Card */
        .note-card {
            position: relative;
            border-radius: 14px;
            padding: 18px;
            background: white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            transition: all 0.25s ease;
            height: 100%;
        }

        /* Hover effect */
        .note-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        }

        /* 🔹 Title */
        .note-title {
            font-weight: 600;
            font-size: 15px;
            color: #1e293b;

            flex: 1;
            min-width: 0;

            overflow: hidden;
            text-overflow: ellipsis;

            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;

            line-height: 1.4;
            word-break: break-word;
        }

        /* 🔹 Triple Dot Button */
        .note-menu-btn {
            width: 34px;
            height: 34px;

            border: none;
            border-radius: 10px;

            background: #f1f5f9;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 18px;
            color: #475569;

            transition: all 0.2s ease;
        }

        /* Hover */
        .note-menu-btn:hover {
            background: #e2e8f0;
            color: #0f172a;
        }

        /* Click */
        .note-menu-btn:focus {
            box-shadow: none;
        }

        /* 🔹 Content */
        .note-content {
            font-size: 14px;
            color: #475569;
            line-height: 1.5;

            display: -webkit-box;
            -webkit-line-clamp: 3;   /* 👈 limits lines */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 🔹 Footer */
        .note-footer {
            border-top: 1px solid #f1f5f9;
            padding-top: 8px;
        }

        /* 🔹 Clickable Overlay */
        .note-link {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        /* Prevent menu click block */
        .note-card .dropdown {
            position: relative;
            z-index: 2;
        }

        /* Note Detail */
        .note-detail-card {
            background: white;
            border-radius: 18px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }

        /* Header */
        .note-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
        }

        /* Long title fix */
        .detail-title {
            font-size: 30px;
            font-weight: 700;
            color: #0f172a;

            word-break: break-word;
            overflow-wrap: break-word;

            max-width: 90%;
        }

        /* Meta */
        .note-meta {
            margin-top: 8px;
            color: #64748b;
            font-size: 14px;
        }

        /* Body */
        .note-body {
            margin-top: 30px;
            line-height: 1.9;
            color: #334155;
            font-size: 16px;

            white-space: pre-wrap;
        }

        /* Action button */
        .action-btn {
            border: none;
            background: #f1f5f9;
            width: 42px;
            height: 42px;
            border-radius: 10px;
            font-size: 22px;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: #e2e8f0;
        }

        /*-- Write Mode CSS --*/
        /* Title Input */
        .note-title-input {
            border: none;
            font-size: 32px;
            font-weight: 700;
            padding: 0;
            box-shadow: none !important;
        }

        /* Content Input */
        .note-content-input {
            border: none;
            resize: none;
            min-height: 400px;
            box-shadow: none !important;
            font-size: 16px;
            line-height: 1.8;
        }
        /*--- Messages ---*/
        .message-container {
            position: relative;
            z-index: 1055;
        }

        .auto-dismiss-message {
            transition: opacity 0.5s ease;
        }
    </style>
    {% block css %}
    <style>
    </style>
    {% endblock %}
</head>
<body>

<!-- 🔝 Navbar -->
<nav class="navbar navbar-expand-lg px-4 custom-navbar">

    <!-- 🔹 Branding (Clickable) -->
    <a class="navbar-brand d-flex align-items-center" href="{% url 'dashboard' %}">
        <img src="{% static 'images/branding.png' %}" alt="KeySafe" class="nav-branding">
    </a>

    <!-- 🔹 Right Side Avatar -->
    <div class="ms-auto dropdown text-center">

        <a href="#" data-bs-toggle="dropdown" class="text-decoration-none">

            <!-- Avatar Image -->
            <img src="{% static 'images/avatar.png' %}" alt="avatar" class="avatar-img">

            <!-- Full Name -->
            <div class="avatar-name small mt-1">
                {{ request.user.name }}
            </div>

        </a>

        <ul class="dropdown-menu dropdown-menu-end mt-2">
            <li class="dropdown-item text-center">
                <strong>{{ request.user.name }}</strong><br>
                <small>{{ request.user.email }}</small>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
                <a class="dropdown-item" href="{% url 'profile' %}">
                    Profile
                </a>
            </li>
            <li>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button class="dropdown-item text-danger">Logout</button>
                </form>
            </li>
        </ul>

    </div>

</nav>

<!-- 🔔 Messages -->
<div class="container mt-3">
    {% include 'components/messages.html' %}
</div>

<!-- 📦 Content -->
<div class="dashboard-container container">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    setTimeout(() => {
        const alerts = document.querySelectorAll('.auto-dismiss-message');

        alerts.forEach(alert => {
            bootstrap.Alert.getOrCreateInstance(alert).close();
        });

    }, 5000); // 5 seconds
</script>
</body>
</html>
