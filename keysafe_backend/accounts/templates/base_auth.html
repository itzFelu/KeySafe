<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title%}{% endblock%} - KeySafe</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
     <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(135deg, #fdfbfb, #ebedee);
        }

        /* =========================
        MAIN LAYOUT
        ========================== */

        .auth-container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* =========================
        LEFT PANEL
        ========================== */

        .left-panel {
            width: 50%;
            height: 100vh;

            position: sticky;
            top: 0;

            background: linear-gradient(135deg, #141e30, #243b55);

            display: flex;
            align-items: center;
            justify-content: center;

            overflow: hidden;

            padding: 40px;
        }

        .left-panel::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(
                circle at center,
                rgba(255,255,255,0.08),
                transparent
            );
        }

        .left-panel img {
            width: 100%;
            max-width: 430px;

            position: relative;
            z-index: 2;

            filter: drop-shadow(0px 20px 35px rgba(0,0,0,0.6));

            transition: transform 0.4s ease;
        }

        .left-panel img:hover {
            transform: scale(1.03);
        }

        /* =========================
        RIGHT PANEL
        ========================== */

        .right-panel {
            width: 50%;
            height: 100vh;

            overflow-y: auto;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 60px 24px;
        }
        /* FOR LONG FORMS LIKE SIGNUP */
        .right-panel.top-align {
            align-items: flex-start;
        }

        /* SCROLLBAR */

        .right-panel::-webkit-scrollbar {
            width: 8px;
        }

        .right-panel::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.18);
            border-radius: 10px;
        }

        /* =========================
        AUTH CARD
        ========================== */

        .auth-card {
            width: 100%;
            max-width: 470px;

            padding: 36px;

            border-radius: 24px;

            background: rgba(255,255,255,0.84);

            backdrop-filter: blur(14px);

            box-shadow: 0 20px 50px rgba(0,0,0,0.15);

            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-title {
            font-size: 2rem;
            font-weight: 700;

            text-align: center;

            margin-bottom: 28px;

            color: #243b55;
        }

        /* =========================
        FORM ELEMENTS
        ========================== */

        .form-control,
        .form-select {
            width: 100%;

            min-height: 56px;

            border-radius: 14px;

            padding: 14px 16px;

            font-size: 1rem;

            border: 1px solid #d7dce2;

            transition: 0.25s ease;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #243b55;
            box-shadow: 0 0 0 0.2rem rgba(36,59,85,0.15);
        }

        .btn-primary {
            width: 100%;

            min-height: 56px;

            border: none;

            border-radius: 14px;

            background: linear-gradient(135deg, #243b55, #141e30);

            font-size: 1rem;
            font-weight: 600;

            transition: 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(0,0,0,0.18);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .mb-3 {
            margin-bottom: 18px !important;
        }

        .form-text-link {
            text-align: center;
            margin-top: 18px;
            font-size: 15px;
        }

        .form-text-link a {
            text-decoration: none;
            color: #243b55;
            font-weight: 600;
        }

        .form-text-link a:hover {
            text-decoration: underline;
        }

        hr {
            margin: 24px 0;
        }

        small.text-danger {
            display: block;
            margin-top: 6px;
        }

        /* =========================
        TABLET
        ========================== */

        @media screen and (max-width: 992px) {

            .left-panel {
                width: 45%;
            }

            .right-panel {
                width: 55%;
            }

            .left-panel img {
                max-width: 300px;
            }
        }

        /* =========================
        MOBILE
        ========================== */

        @media screen and (max-width: 768px) {

            html,
            body {
                height: auto;
                overflow: auto;
            }

            body {
                background: #f4f6f8;
            }

            .auth-container {
                display: block;
                height: auto;
            }

            /* TOP LOGO */
            .left-panel {
                width: 100%;
                height: auto;
                min-height: unset;

                position: relative;

                background: transparent;

                padding: 24px 20px 12px;
            }

            .left-panel::after {
                display: none;
            }

            .left-panel img {
                display: block;

                width: 220px;
                max-width: 85%;

                margin: 0 auto;

                filter: none;

                transform: none !important;
            }

            /* FORM SECTION */
            .right-panel {
                width: 100%;
                height: auto;

                overflow: visible;

                display: block;

                padding: 0 14px 30px;
            }

            .auth-card {
                width: 100%;
                max-width: 100%;

                margin: 0;

                padding: 28px 20px;

                border-radius: 20px;

                background: #fff;

                box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            }

            .auth-title {
                font-size: 32px;
                margin-bottom: 28px;
            }

            .form-control,
            .form-select {
                width: 100%;

                height: 60px !important;

                font-size: 17px !important;

                padding: 16px !important;

                border-radius: 14px !important;
            }

            button,
            .btn,
            .btn-primary {
                width: 100%;

                height: 60px;

                font-size: 17px;

                border-radius: 14px;
            }
        }
        /* PASSWORD TOGGLE */

        .password-wrapper {
            position: relative;
        }

        .password-input {
            padding-right: 52px !important;
        }

        .password-toggle {
            position: absolute;

            top: 50%;
            right: 16px;

            transform: translateY(-50%);

            border: none;
            background: transparent;

            color: #64748b;

            font-size: 18px;

            cursor: pointer;

            padding: 0;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: #0f172a;
        }

        .password-toggle:focus {
            outline: none;
            box-shadow: none;
        }
        
        /* FIX PASSWORD EYE ALIGNMENT ON MOBILE */

        @media screen and (max-width: 768px) {

            .password-wrapper {
                position: relative;
            }

            .password-toggle {
                position: absolute;

                top: 50%;

                right: 16px;

                transform: translateY(-50%);

                height: auto !important;
                width: auto !important;

                padding: 0 !important;

                background: transparent !important;

                display: flex;
                align-items: center;
                justify-content: center;
            }

            .password-input {
                padding-right: 52px !important;
            }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <!-- LEFT -->
    <div class="left-panel">
        <img src="{% static 'images/logo.png' %}" alt="KeySafe Logo">
    </div>

    <!-- RIGHT -->
    <div class="right-panel">
        {% block content %}{% endblock %}
    </div>
</div>
<script>

    function togglePassword(inputId, button) {

        const input =
            document.getElementById(inputId);

        const icon =
            button.querySelector("i");

        if (input.type === "password") {

            input.type = "text";

            icon.classList.remove("bi-eye");
            icon.classList.add("bi-eye-slash");

        } else {

            input.type = "password";

            icon.classList.remove("bi-eye-slash");
            icon.classList.add("bi-eye");
        }
    }

</script>
{% block script %}{% endblock %}
</body>
</html>
